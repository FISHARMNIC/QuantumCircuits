<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://unpkg.com/mathjs/lib/browser/math.js"></script>
    <script src="scripts/main.js" type="module" defer></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1> Quantum Circuit Simulator</h1>
    <br>

    <div class="wrapper" style="padding-bottom: 50px; margin-bottom: 10px;">
        <table id="grid"></table>
        <div class="row-controls">
            <button onclick="_addRow()">+</button>
            <button onclick="_removeRow()">-</button>
        </div>
    </div>

    <br>

    <div id="buttons" class="wrapper"></div>

    <br>

    <!-- <div class="wrapper">
        <button onclick="_uiRun()">Run</button>
    </div> -->

    <pre id="output" class="wrapper two">Waiting...</pre>

  
    <h2>Example Circuits:</h2>
    <div class="wrapper">
          
        <figure>
            <img src="images/adder.png">
            <figcaption>Full Adder</figcaption>
        </figure>
        <figure>
            <img src="images/adder2.png">
            <figcaption>Half Adder</figcaption>
        </figure>
        <figure>
            <img src="images/bell-state.png">
            <figcaption>Bell State</figcaption>
        </figure>
        <figure>
            <img src="images/qft.png">
            <figcaption>Fourier Transform</figcaption>
        </figure>
    </div>
</body>

</html>
